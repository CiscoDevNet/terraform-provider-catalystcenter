---
name: Sync Device Credential
rest_endpoint: /dna/intent/api/v1/sites/deviceCredentials/apply
no_data_source: true
no_update: true
no_delete: true
no_import: true
no_read: true
id_from_attribute: true
skip_minimum_test: true
retry_on_error_codes:
  - NCND00010
doc_category: Network Settings
test_tags: [CREDENTIALS]
res_description:
  "This resource applies (syncs) a device credential that is already assigned to a site to the site's network devices.
  It is the equivalent of the Apply action in Design > Network Settings > Credentials > Manage Credentials. The
  credential must already be assigned to the site (see `catalystcenter_assign_credentials`). Applying at a site also
  affects child sites that inherit the credential. The endpoint accepts a single credential ID per call (CLI, SNMPv2c
  Read, SNMPv2c Write or SNMPv3).
  <p/>
  This resource only triggers the apply operation on create and waits for the task to complete. 
  Changing any attribute forces a new apply, and when the resource is destroyed or refreshed no
  actions are performed on Catalyst Center."
attributes:
  - model_name: siteId
    type: String
    mandatory: true
    requires_replace: true
    id: true
    description: The ID of the site whose assigned credential should be applied to its devices.
    example: 7ef492ca-b008-479a-9de4-7e40438c7d10
    test_value: catalystcenter_assign_credentials.test.site_id
  - model_name: deviceCredentialId
    type: String
    mandatory: true
    requires_replace: true
    description: The ID of the credential to apply. Must be a CLI, SNMPv2c Read, SNMPv2c Write or SNMPv3 credential ID.
    example: 5e6f7b3a-2b0b-4a7d-8b1c-0d4b1cd5e1b1
    test_value: catalystcenter_assign_credentials.test.cli_id
  - model_name: configureDevice
    type: Bool
    requires_replace: true
    description:
      'Only applicable when `device_credential_id` is a CLI credential; ignored by Catalyst Center for SNMPv2c/SNMPv3
      credential IDs. If `true`, the applied CLI credential is configured on locally-authenticated devices and
      authentication is performed before the device is managed in inventory; AAA-authenticated devices are only
      managed, not reconfigured. If `false`, devices are updated in inventory with the applied credential without any
      authentication. When omitted, the parameter is not sent and the Catalyst Center default applies.'
    example: false
test_prerequisites: |
  resource "catalystcenter_credentials_cli" "test" {
    description = "TestCli1"
    username    = "user1"
    password    = "password1"
  }
  data "catalystcenter_site" "test" {
    name_hierarchy = "Global"
  }
  resource "catalystcenter_area" "test" {
    name       = "Area1"
    parent_id  = data.catalystcenter_site.test.id
    depends_on = [catalystcenter_credentials_cli.test]
  }
  resource "catalystcenter_assign_credentials" "test" {
    site_id = catalystcenter_area.test.id
    cli_id  = catalystcenter_credentials_cli.test.id
  }
