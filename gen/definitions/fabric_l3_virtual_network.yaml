---
# NOTE: The Create, Update and Delete functions in the generated resource file
# (internal/provider/resource_catalystcenter_fabric_l3_virtual_network.go) contain
# hand-written logic that mirrors several undocumented Catalyst Center constraints
# around Layer 3 Virtual Networks, in particular anchored VNs and the
# `merge_fabric_sites` (additive) mode. Specifically:
#   * Anchored Create is a two-phase POST+PUT (CatC rejects POST with multiple
#     fabricIds when anchoredSiteId is set).
#   * Anchored Update splits a combined add+remove of fabricIds into two
#     sequential PUTs (CatC errorCode NCHS20477).
#   * Anchored Delete pre-shrinks fabricIds to the anchor only before DELETE
#     (CatC errorCode NCHS20691).
#   * `anchored_site_id` mutations: CatC does not allow adding, changing, or
#     removing the anchor of an existing L3 VN that still has fabric
#     associations. The Update handler rejects such mutations with a validation
#     error, except for the special case of removing the anchor together with
#     emptying `fabric_ids` (i.e. unassociating the VN from all fabric sites).
#   * `INFRA_VN` / `DEFAULT_VN` cannot be anchored and are managed via PUT only.
# If you re-run `go generate`, remove the //template:begin/end markers around
# these hand-edited functions so they are preserved.
name: Fabric L3 Virtual Network
rest_endpoint: /dna/intent/api/v1/sda/layer3VirtualNetworks
id_from_query_path: response.0
id_from_query_path_attribute: id
import_no_id: true
data_source_no_id: true
skip_minimum_test: true
put_id_include_path: "0.id"
put_no_id: true
doc_category: SDA
mutex: true
allow_existing_on_create: true
attributes:
  - model_name: virtualNetworkName
    requires_replace: true
    data_path: "0"
    query_param: true
    response_data_path: response.0.virtualNetworkName
    type: String
    mandatory: true
    description: Name of the layer 3 virtual network. If `INFRA_VN` or `DEFAULT_VN` is used, those layer 3 virtual networks will be updated instead of created.
    example: MyL3VN
  - model_name: fabricIds
    data_path: "0"
    response_data_path: response.0.fabricIds
    description: IDs of the fabrics this layer 3 virtual network is to be assigned to.
    type: Set
    element_type: String
    example: 5e6f7b3a-2b0b-4a7d-8b1c-0d4b1cd5e1b1
    test_value: "[catalystcenter_fabric_site.test.id]"
  - model_name: anchoredSiteId
    data_path: "0"
    response_data_path: response.0.anchoredSiteId
    description: "Fabric ID of the fabric site this layer 3 virtual network is to be anchored at. Must be one of the `fabric_ids` entries. Catalyst Center does not allow adding, changing, or removing the anchor on an existing L3 VN that has fabric associations; the only supported mutation is removing the anchor together with emptying `fabric_ids` (effectively unassociating the VN from all fabric sites)."
    type: String
    example: ""
    exclude_test: true
  - model_name: mergeFabricSites
    tf_name: merge_fabric_sites
    type: Bool
    write_only: true
    exclude_test: true
    description: "When set to `true`, the `fabric_ids` declared in this resource are merged with the existing fabric associations on Catalyst Center (additive on create/update, subtractive on delete), rather than replacing the entire set. Use this in environments where multiple resources or external processes manage fabric associations for the same L3 Virtual Network."
    example: "false"
test_prerequisites: |
  data "catalystcenter_site" "test" {
    name_hierarchy = "Global"
  }
  resource "catalystcenter_area" "test" {
    name      = "Area1"
    parent_id = data.catalystcenter_site.test.id
  }
  resource "catalystcenter_fabric_site" "test" {
    site_id                     = catalystcenter_area.test.id
    pub_sub_enabled             = false
    authentication_profile_name = "No Authentication"
  }
