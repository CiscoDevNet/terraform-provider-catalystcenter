---
name: Floor Image
rest_endpoint: /dna/intent/api/v2/floors/%v/uploadImage
no_data_source: true
no_update: true
no_delete: true
no_import: true
no_read: true
res_description: >-
  This resource uploads a floor plan image (PNG, JPEG, PDF) to an existing floor in Catalyst Center.
  The image is used for map visualization and RF planning.
  Every time this resource is created or re-created, the image is uploaded.
  When destroyed, no action is taken (Catalyst Center does not support deleting floor images via API).
doc_category: Sites
skip_minimum_test: true
test_tags: [FLOOR_IMAGE]
attributes:
  - model_name: floor_id
    tf_name: floor_id
    type: String
    reference: true
    id: true
    description: The ID of the floor to upload the image to
    example: 34af13e4-da94-4c5f-8da2-aa51a0f0655e
    test_value: catalystcenter_floor.test.id
    requires_replace: true
  - model_name: sourcePath
    tf_name: source_path
    type: String
    mandatory: true
    write_only: true
    requires_replace: true
    description: >-
      Local file path to the floor plan image.
      Supported formats: PNG, JPEG, PDF.
    example: testdata/floor_plans/test_floor_plan.png
test_prerequisites: |
  data "catalystcenter_site" "test" {
    name_hierarchy = "Global"
  }
  resource "catalystcenter_building" "test" {
    name      = "FloorImageTestBldg"
    parent_id = data.catalystcenter_site.test.id
    country   = "United States"
    address   = "150 W Tasman Dr, San Jose"
    latitude  = 37.338
    longitude = -121.832
  }
  resource "catalystcenter_floor" "test" {
    name             = "FloorImageTestFloor"
    parent_id        = catalystcenter_building.test.id
    floor_number     = 1
    rf_model         = "Drywall Office Only"
    width            = 100
    length           = 100
    height           = 3
    units_of_measure = "feet"
  }
