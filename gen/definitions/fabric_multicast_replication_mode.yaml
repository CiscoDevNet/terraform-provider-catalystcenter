---
name: Fabric Multicast Replication Mode
rest_endpoint: /dna/intent/api/v1/sda/multicast
delete_no_id: true
put_create: true
mutex: true
doc_category: SDA
put_delete: true
delete_body: '[{"fabricId":"{id}","replicationMode":"HEADEND_REPLICATION"}]'
attributes:
  - model_name: fabricId
    type: String
    query_param: true
    id: true
    data_path: '0'
    response_data_path: response.0.fabricId
    example: 8e6f7b3a-2b0b-4a7d-8b1c-0d4b1cd5e1b1
    test_value: catalystcenter_fabric_site.test.id
    description: Fabric Site ID
  - model_name: replicationMode
    type: String
    mandatory: true
    data_path: '0'
    response_data_path: response.0.replicationMode
    description: Replication Mode deployed in the fabric site
    example: HEADEND_REPLICATION
    enum_values: [HEADEND_REPLICATION, NATIVE_MULTICAST]
test_prerequisites: |
  data "catalystcenter_site" "test" {
    name_hierarchy = "Global"
  }
  resource "catalystcenter_area" "test" {
    name      = "Area1"
    parent_id = data.catalystcenter_site.test.id
  }
  resource "catalystcenter_fabric_site" "test" {
    site_id                     = catalystcenter_area.test.id
    pub_sub_enabled             = false
    authentication_profile_name = "No Authentication"
  }
  resource "catalystcenter_ip_pool" "test" {
    name                        = "MyPool1"
    pool_type                   = "Generic"
    address_space_subnet        = "192.168.0.0"
    address_space_prefix_length = 16
    address_space_gateway       = "192.168.0.1"
    address_space_dhcp_servers  = ["192.168.0.10"]
    address_space_dns_servers   = ["192.168.0.53"]
  }
  resource "catalystcenter_ip_pool_reservation" "test" {
    name                = "MyRes1"
    pool_type           = "Generic"
    site_id             = catalystcenter_area.test.id
    ipv4_subnet         = "192.168.10.0"
    ipv4_prefix_length  = 24
    ipv4_gateway        = "192.168.10.1"
    ipv4_dhcp_servers   = ["1.2.3.4"]
    ipv4_dns_servers    = ["2.3.4.5"]
    ipv4_global_pool_id = catalystcenter_ip_pool.test.id
  }
  resource "catalystcenter_fabric_l3_virtual_network" "test" {
    virtual_network_name = "SDA_VN1"
    fabric_ids           = [catalystcenter_fabric_site.test.id]
  }
  resource "catalystcenter_fabric_multicast_virtual_network" "test" {
    fabric_id            = catalystcenter_fabric_site.test.id
    virtual_network_name = "SDA_VN1"
    ip_pool_name         = "MyRes1"
    ipv4_ssm_ranges      = ["225.0.0.0/8"]

    depends_on = [
      catalystcenter_fabric_l3_virtual_network.test,
      catalystcenter_ip_pool_reservation.test
    ]
  }
